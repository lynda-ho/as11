name: Automated Test
on: [push]
jobs:
  automated_test:
    name: Automated Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Produce test1_expected.txt output
      run: python3 find_lowest_number.py test_data/test1_input.txt test_data/test1_expected.txt
    - name: Produce test2_expected.txt output
      run: python3 find_lowest_number.py test_data/test2_input.txt test_data/test2_expected.txt
    - name: Produce test3_expected.txt output
      run: python3 find_lowest_number.py test_data/test3_input.txt test_data/test3_expected.txt
